policy_path: "controller/logs/2026-05-11_00-28-28/exported/policy.pt"  # [best] height with new delay

xml_path: "controller/robot/pineapple_v2/scene.xml"

# Total simulation time
simulation_duration: 19
# Simulation time step
simulation_dt: 0.005
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 4
# KP, KD gains for the PD controller, order matches xml joint order
kps: [40, 25, 25, 0, 40, 25, 25,  0]
kds: [1.0, 0.5, 0.5, 0.3, 1.0, 0.5, 0.5, 0.3]


# default_angles, order matches xml joint order
default_angles: [-0.1,  0.83, -1.484, 0.0, 0.1, 0.83, -1.484, 0.0]

lin_vel_scale: 2.0
ang_vel_scale: 0.25

dof_pos_scale: 1.0
dof_vel_scale: 0.05
pos_action_scale: 0.5  # 0.5
vel_action_scale: 5.0
cmd_scale: [1.0, 1.0, 1.0]
num_actions: 8
num_obs: 192   # 186 for no height, 192 for height command added
one_step_obs_size: 32  # 31 for no height, 32 for height command added
obs_buffer_size: 6
leg_joint_indices: [0, 1, 2, 3, 4, 5]   # leg joints indices from policy
wheel_joint_indices: [6, 7]   # wheel joints indices from policy
policy_index_map: [0, 4, 1, 5, 2, 6, 3, 7] # Mapping from policy index to xml index. Change this if policy order differs from XML order.

cmd_init: [0.0, 0.0, 0.0]
enable_height_command: true
cmd_height_init: 0.3
max_lin_vel: 1.5
max_ang_vel: 2.0
min_height: 0.25
max_height: 0.35
height_step: 0.005
height_scale: 3.0

# Scripted command sequence for reproducible SIPO comparisons.
# Each step runs for `duration` seconds. Fields: vx (m/s), wz (rad/s), height (m).
command_sequence:
  # -- Phase 1: settle --
  - {duration: 1.0, vx:  0.0, wz:  0.0, height: 0.30}

  # -- Phase 2: hard accel/decel oscillations (max pitch excitation) --
  - {duration: 1.0, vx:  1, wz:  0.0, height: 0.30}   # full forward  → pitch fwd
  - {duration: 1.0, vx: -1, wz:  0.0, height: 0.30}   # full backward → pitch bwd
  - {duration: 2.0, vx:  1.5, wz:  0.0, height: 0.30}   # repeat
  - {duration: 2.0, vx: -1.5, wz:  0.0, height: 0.30}
  - {duration: 1.0, vx:  0.0, wz:  0.0, height: 0.30}   # stop

  # -- Phase 3: forward while changing height (pitch + leg geometry change) --
  - {duration: 2.0, vx:  1.0, wz:  0.0, height: 0.35}   # moving + body up
  - {duration: 2.0, vx:  1.0, wz:  0.0, height: 0.25}   # moving + body down
  - {duration: 0.5, vx:  0.0, wz:  0.0, height: 0.30}   # stop + return height

  # -- Phase 4: forward + yaw (pitch + roll combined) --
  - {duration: 3.0, vx:  1.0, wz:  2.0, height: 0.30}   # forward + spin left
  - {duration: 3.0, vx:  1.0, wz: -2.0, height: 0.30}   # forward + spin right